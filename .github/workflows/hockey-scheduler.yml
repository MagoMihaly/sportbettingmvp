name: Hockey Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "5 * * * *"

jobs:
  check-triggers:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call trigger check endpoint
        env:
          SCHEDULER_BASE_URL: ${{ secrets.SCHEDULER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$SCHEDULER_BASE_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            -X POST "$SCHEDULER_BASE_URL/api/internal/check-hockey-triggers" \
            -H "Authorization: Bearer $CRON_SECRET"

  capture-odds:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call odds sync endpoint
        env:
          SCHEDULER_BASE_URL: ${{ secrets.SCHEDULER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$SCHEDULER_BASE_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            -X POST "$SCHEDULER_BASE_URL/api/internal/capture-odds-snapshots" \
            -H "Authorization: Bearer $CRON_SECRET"
